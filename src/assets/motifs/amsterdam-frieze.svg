<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
  <!--
    Decorative scatter — windmills, bicycles, sunglasses, TV remotes and
    books in stylised line-art at varied positions, sizes and slight
    rotations. Used as a top-portion page accent in Layout.astro; a
    runtime script randomises which symbol fills each slot on every
    page load, and swaps one slot for the stroopwafel misfit. The
    consumer applies a vertical mask gradient to fade the lower
    portion. Themed via currentColor.
  -->
  <defs>
    <g id="windmill" fill="currentColor" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <!-- Sails (X cross through hub at 0,0) -->
      <line x1="-22" y1="-22" x2="22" y2="22" stroke-width="2.6"/>
      <line x1="-22" y1="22" x2="22" y2="-22" stroke-width="2.6"/>
      <!-- Hub -->
      <circle cx="0" cy="0" r="3" stroke="none"/>
      <!-- Cap (block under hub) -->
      <rect x="-7" y="2" width="14" height="7" stroke="none"/>
      <!-- Tower trapezoid -->
      <path d="M -7 9 L 7 9 L 11 34 L -11 34 Z" stroke="none"/>
    </g>
    <g id="bicycle" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <!-- Wheels -->
      <circle cx="-18" cy="12" r="10"/>
      <circle cx="18" cy="12" r="10"/>
      <!-- Frame: top tube + down tube -->
      <path d="M -18 12 L 0 -2 L 18 12"/>
      <!-- Seat tube -->
      <path d="M 0 -2 L -3 12"/>
      <!-- Handlebar -->
      <path d="M 18 -2 L 22 -6"/>
      <!-- Saddle -->
      <line x1="-6" y1="-6" x2="3" y2="-6" stroke-width="1.8"/>
    </g>
    <g id="sunglasses" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <!-- Lenses -->
      <ellipse cx="-13" cy="0" rx="9" ry="7"/>
      <ellipse cx="13" cy="0" rx="9" ry="7"/>
      <!-- Bridge -->
      <path d="M -4 -1 Q 0 -5 4 -1"/>
      <!-- Arms -->
      <line x1="-22" y1="-3" x2="-27" y2="-1"/>
      <line x1="22" y1="-3" x2="27" y2="-1"/>
    </g>
    <g id="remote" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <!-- Body -->
      <rect x="-8" y="-22" width="16" height="44" rx="4"/>
      <!-- Speaker slit at top -->
      <line x1="-3" y1="-17" x2="3" y2="-17" stroke-width="1.4"/>
      <!-- Power dot -->
      <circle cx="0" cy="-11" r="1.6" fill="currentColor" stroke="none"/>
      <!-- D-pad ring + centre -->
      <circle cx="0" cy="0" r="5" stroke-width="1.4"/>
      <circle cx="0" cy="0" r="1.4" fill="currentColor" stroke="none"/>
      <!-- Lower buttons -->
      <circle cx="-3" cy="10" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="3" cy="10" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="0" cy="16" r="1.3" fill="currentColor" stroke="none"/>
    </g>
    <g id="book" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <!-- Open book outline: two pages meeting at centre -->
      <path d="M -22 -10 L 0 -6 L 22 -10 L 22 12 L 0 16 L -22 12 Z"/>
      <!-- Centre crease -->
      <line x1="0" y1="-6" x2="0" y2="16"/>
      <!-- Text lines, left page -->
      <line x1="-17" y1="-3" x2="-5" y2="-1" stroke-width="1.2"/>
      <line x1="-17" y1="2" x2="-5" y2="4" stroke-width="1.2"/>
      <line x1="-17" y1="7" x2="-5" y2="9" stroke-width="1.2"/>
      <!-- Text lines, right page -->
      <line x1="5" y1="-1" x2="17" y2="-3" stroke-width="1.2"/>
      <line x1="5" y1="4" x2="17" y2="2" stroke-width="1.2"/>
      <line x1="5" y1="9" x2="17" y2="7" stroke-width="1.2"/>
    </g>
    <!--
      The misfit: a stroopwafel — round Dutch waffle cookie. Hidden
      among the other motifs as a small reward for observant guests.
      Exactly one per scatter, placed at a random slot at page load.
    -->
    <g id="stroopwafel" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round">
      <circle cx="0" cy="0" r="14"/>
      <line x1="-12" y1="-7" x2="12" y2="-7"/>
      <line x1="-13" y1="-3" x2="13" y2="-3"/>
      <line x1="-13" y1="3" x2="13" y2="3"/>
      <line x1="-12" y1="7" x2="12" y2="7"/>
      <line x1="-7" y1="-12" x2="-7" y2="12"/>
      <line x1="-3" y1="-13" x2="-3" y2="13"/>
      <line x1="3" y1="-13" x2="3" y2="13"/>
      <line x1="7" y1="-12" x2="7" y2="12"/>
    </g>
  </defs>

  <!--
    Scatter slots. The symbol referenced here is just a server-rendered
    default — Layout.astro reassigns each slot to a random symbol on
    page load, then forces one slot to the stroopwafel.
  -->

  <!-- Top band: dense, mostly upright -->
  <use href="#windmill" transform="translate(120 80) rotate(-8)"/>
  <use href="#bicycle"  transform="translate(310 110) rotate(5)"/>
  <use href="#windmill" transform="translate(510 75) rotate(12)"/>
  <use href="#bicycle"  transform="translate(710 100) rotate(-7)"/>
  <use href="#windmill" transform="translate(900 85) rotate(6) scale(1.05)"/>
  <use href="#bicycle"  transform="translate(1080 110) rotate(-10)"/>

  <!-- Upper-middle band -->
  <use href="#windmill" transform="translate(220 230) rotate(4)"/>
  <use href="#bicycle"  transform="translate(450 250) rotate(-9) scale(1.1)"/>
  <use href="#windmill" transform="translate(740 240) rotate(10)"/>
  <use href="#bicycle"  transform="translate(970 270) rotate(-4)"/>

  <!-- Middle band -->
  <use href="#windmill" transform="translate(150 380) rotate(-6)"/>
  <use href="#bicycle"  transform="translate(380 400) rotate(8) scale(0.95)"/>
  <use href="#windmill" transform="translate(620 390) rotate(5)"/>
  <use href="#bicycle"  transform="translate(850 410) rotate(-11)"/>
  <use href="#windmill" transform="translate(1070 395) rotate(7)"/>

  <!-- Lower-middle band -->
  <use href="#bicycle"  transform="translate(260 530) rotate(-5)"/>
  <use href="#windmill" transform="translate(530 545) rotate(9) scale(0.95)"/>
  <use href="#bicycle"  transform="translate(800 535) rotate(-8)"/>
  <use href="#windmill" transform="translate(1010 555) rotate(4)"/>

  <!-- Bottom band: sparse, will fade out via mask -->
  <use href="#bicycle"  transform="translate(380 650) rotate(6) scale(0.95)"/>
  <use href="#windmill" transform="translate(700 660) rotate(-7)"/>
</svg>
